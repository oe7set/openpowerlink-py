name: ci

# Fast host-only checks (no native build): parser, scaling and the PowerlinkIO
# process-image logic. The heavy native/wheel build lives in wheels.yml.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # hatch-vcs version resolution

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q
